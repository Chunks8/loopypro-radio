name: Refresh Playlist

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual refresh (optional)'
        required: false
        default: 'Manual trigger'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Fetch latest forum tracks
        run: python3 scripts/refresh_playlist.py

      - name: Build
        run: npm run build

      - name: Commit and push if changed
        run: |
          git config user.email "gaubie@gmail.com"
          git config user.name "LoopyPro Radio Bot"
          git add -A
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "Playlist refresh (manual) $(date -u '+%Y-%m-%d %H:%M UTC')" && git push
